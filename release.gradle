// release.gradle — script plugin (apply from: ...)

apply plugin: 'java'
apply plugin: 'maven-publish'
apply plugin: 'signing'

/** -------- Helpers -------- */
def projectProperty = { String k, def d = null -> project.findProperty(k) ?: d }      // gradle property (no envs)
def projectBoolean = { String k -> (projectProperty(k)?.toString()?.toBoolean() ?: false) }

def isRelease = projectBoolean('releasing') // set with -Preleasing=true on real deploys

// Prefer Gradle properties (works on CI without env vars).
// Put these in ~/.gradle/gradle.properties or project gradle.properties on CI.
def ossrhUser = projectProperty('NEXUS_USERNAME') ?: projectProperty('ossrhUsername')
def ossrhPass = projectProperty('NEXUS_PASSWORD') ?: projectProperty('ossrhPassword')

// Optional in-memory signing keys (recommended for CI)
// signingKey: ASCII-armored private key, signingPassword: key passphrase
def signingKey = projectProperty('signingKey')
def signingPassword = projectProperty('signingPassword')

/** -------- Java / Artifacts -------- */
base {
    archivesName = projectProperty('artifactId') ?: project.name
}

java {
    toolchain { languageVersion = JavaLanguageVersion.of(17) }
    withSourcesJar()
    withJavadocJar()
}

/** -------- Publishing -------- */
publishing {
    repositories {
        // Always-available local test repo
        maven {
            name = 'test'
            url = uri(rootProject.file('build/repository'))
        }

        // OSSRH only if credentials are available (no envs needed)
        if (ossrhUser && ossrhPass) {
            maven {
                name = 'ossrhStaging'
                url = uri('https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/')
                credentials {
                    username = ossrhUser
                    password = ossrhPass
                }
            }
        } else {
            logger.lifecycle("[publishing] OSSRH credentials not provided; skipping remote repository configuration.")
        }
    }

    publications {
        mavenJava(MavenPublication) {
            from components.java

            groupId = 'com.bugsnag'
            artifactId = projectProperty('artifactId') ?: project.name
            version = rootProject.version

            pom {
                name = projectProperty('projectName') ?: artifactId
                description = projectProperty('projectDescription') ?: "Bugsnag Java Notifier"
                url = 'https://github.com/bugsnag/bugsnag-java'

                scm {
                    url = 'https://github.com/bugsnag/bugsnag-java'
                    connection = 'scm:git:git://github.com/bugsnag/bugsnag-java.git'
                    developerConnection = 'scm:git:ssh://git@github.com/bugsnag/bugsnag-java.git'
                }

                licenses {
                    license {
                        name = 'MIT'
                        url = 'http://opensource.org/licenses/MIT'
                        distribution = 'repo'
                    }
                }

                organization {
                    name = 'Bugsnag'
                    url = 'https://bugsnag.com'
                }

                developers {
                    developer {
                        id = 'loopj'
                        name = 'James Smith'
                        email = 'james@bugsnag.com'
                    }
                }
            }
        }
    }
}

/** -------- Signing (no .asc on test publishes) -------- */
signing {
    // Only *require* signing for real releases
    required { isRelease }

    // Only attach signatures when we actually want to sign
    if (isRelease) {
        if (signingKey && signingPassword) {
            useInMemoryPgpKeys(signingKey as String, signingPassword as String)
        }
        sign(publishing.publications['mavenJava'])
    }
}

/** -------- Safety: never try publishing to OSSRH without creds -------- */
import org.gradle.api.publish.maven.tasks.PublishToMavenRepository

tasks.withType(PublishToMavenRepository).configureEach {
    onlyIf {
        // Allow all "test" publishes, and only allow OSSRH when creds exist
        repository?.name != 'ossrhStaging' || (ossrhUser && ossrhPass)
    }
}